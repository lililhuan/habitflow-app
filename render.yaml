# render.yaml — one-click deploy config for Render (render.com)
services:
  - type: web
    name: habitflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn asgi:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: FLET_WEB
        value: "1"
      - key: DATABASE_PATH
        value: /tmp/habitflow.db
      - key: PYTHON_VERSION
        value: "3.11"
      # Add your OAuth credentials here if using social login:
      # - key: GOOGLE_CLIENT_ID
      #   sync: false
      # - key: GOOGLE_CLIENT_SECRET
      #   sync: false
      # - key: GITHUB_CLIENT_ID
      #   sync: false
      # - key: GITHUB_CLIENT_SECRET
      #   sync: false
